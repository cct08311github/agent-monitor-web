<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Monitor — 登入</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">🔍</div>
            <div class="logo-text">
                <h1>OpenClaw Monitor</h1>
                <p>Agent 監控系統</p>
            </div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">使用者名稱</label>
                <input type="text" id="username" name="username" autocomplete="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">登入</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>

    <script src="js/base-path.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
