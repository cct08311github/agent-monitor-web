<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Monitor — 登入</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text h1 {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.2;
        }

        .logo-text p {
            font-size: 12px;
            color: #94a3b8;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        input::placeholder { color: #64748b; }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s, opacity 0.15s;
        }

        .btn-login:hover:not(:disabled) { background: #2563eb; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-msg {
            display: none;
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px;
            color: #f87171;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">🔍</div>
            <div class="logo-text">
                <h1>OpenClaw Monitor</h1>
                <p>Agent 監控系統</p>
            </div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">使用者名稱</label>
                <input type="text" id="username" name="username" autocomplete="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">登入</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>

    <script>
        // If already authenticated, redirect to main app
        fetch('/api/auth/me', { credentials: 'include' })
            .then(r => r.ok ? (location.href = '/') : null)
            .catch(() => null);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = '登入中...';
            errEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    location.href = '/';
                } else {
                    const msgs = {
                        invalid_credentials: '使用者名稱或密碼錯誤',
                        auth_not_configured: '系統尚未設定密碼，請先設定 AUTH_PASSWORD_HASH',
                        too_many_attempts: `登入嘗試次數過多，請稍後再試 (${data.retryAfter || 60}秒)`,
                        missing_credentials: '請輸入使用者名稱和密碼',
                    };
                    errEl.textContent = msgs[data.error] || `登入失敗：${data.error || '未知錯誤'}`;
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = '網路錯誤，請確認連線後重試';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '登入';
            }
        });
    </script>
</body>
</html>
